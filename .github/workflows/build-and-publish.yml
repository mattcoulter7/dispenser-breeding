name: Build and Publish

on:
  pull_request:
  push:
    branches:
      - main
      - '*.*.*'
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      publish_artifacts:
        description: "Build and publish to Modrinth / GitHub Release"
        type: boolean
        required: true
        default: true
      update_metadata:
        description: "Update Modrinth README and icon"
        type: boolean
        required: true
        default: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-24.04
    if: github.event_name != 'workflow_dispatch' || inputs.publish_artifacts || inputs.update_metadata

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v6

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'microsoft'

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Build
        run: ./gradlew build

      - name: Capture build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-libs
          path: build/libs/dispenserbreeding-*.jar
          if-no-files-found: error

  publish:
    runs-on: ubuntu-24.04
    needs: build
    if: |
      github.event_name == 'release' ||
      (github.event_name == 'workflow_dispatch' && inputs.publish_artifacts)

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-libs
          path: build/libs

      - name: Compute publish metadata
        id: publish_meta
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "release" ]]; then
            echo "display_name=[Fabric] ${{ github.event.release.target_commitish }}-${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
            echo "version_name=${{ github.event.release.target_commitish }}-${{ github.event.release.tag_name }}-fabric" >> "$GITHUB_OUTPUT"
          else
            SHORT_SHA="$(git rev-parse --short HEAD)"
            echo "display_name=[Fabric] manual-${GITHUB_REF_NAME}-${SHORT_SHA}" >> "$GITHUB_OUTPUT"
            echo "version_name=manual-${GITHUB_REF_NAME}-${SHORT_SHA}-fabric" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to Modrinth and attach jar to GitHub Release
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          modrinth-id: zlKk8V6R
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

          files: |
            build/libs/dispenserbreeding-*.jar

          name: ${{ steps.publish_meta.outputs.display_name }}
          version: ${{ steps.publish_meta.outputs.version_name }}

          loaders: fabric
          game-versions: 26.1.2

          dependencies: |
            fabric-api(required)

  update-modrinth-metadata:
    runs-on: ubuntu-24.04
    needs: build
    if: |
      (github.event_name == 'push' && github.ref_name == 'main') ||
      (github.event_name == 'workflow_dispatch' && inputs.update_metadata)

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Update Modrinth project body from README.md
        env:
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
        run: |
          python - <<'PY' > body.json
          import json
          from pathlib import Path

          readme = Path("README.md").read_text(encoding="utf-8")
          print(json.dumps({"body": readme}))
          PY

          curl --fail-with-body \
            -X PATCH \
            -H "Authorization: $MODRINTH_TOKEN" \
            -H "Content-Type: application/json" \
            --data @body.json \
            "https://api.modrinth.com/v2/project/dispenser-breeding"

      - name: Update Modrinth project icon
        env:
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
        run: |
          curl --fail-with-body \
            -X PATCH \
            -H "Authorization: $MODRINTH_TOKEN" \
            -H "Content-Type: image/png" \
            --data-binary @src/main/resources/assets/dispenserbreeding/icon-256.png \
            "https://api.modrinth.com/v2/project/dispenser-breeding/icon?ext=png"