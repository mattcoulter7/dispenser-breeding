name: Build Loader (reusable)
on:
  workflow_call:
    inputs:
      loader:
        required: true
        type: string
      mc_version:
        required: true
        type: string
      mod_version:
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
      - name: Build for loader
        run: |
          echo "Building for loader: ${{ inputs.loader }}"
