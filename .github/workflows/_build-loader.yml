name: Build Loader (reusable)
on:
  workflow_call:
    inputs:
      loader:
        required: true
        type: string
      mc_version:
        required: true
        type: string
      mod_version:
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v3
        continue-on-error: true
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
      - name: Set execute permission
        run: chmod +x ./gradlew
      - name: Build for loader
        run: |
          ./gradlew :${{ inputs.loader }}:build
      - name: Upload loader artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ inputs.loader }}
          path: |
            ${{ inputs.loader }}/build/libs/*.jar
          if-no-files-found: error
